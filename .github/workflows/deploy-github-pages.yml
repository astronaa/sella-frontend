name: Deploy GitHub Pages

on:
  push:
    branches:
      - static-github-pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages base path
        shell: bash
        run: |
          if [[ "${{ github.event.repository.name }}" == "${{ github.repository_owner }}.github.io" ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_APP_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_APP_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Build static export
        run: npm run build:github-pages
        env:
          NEXT_PUBLIC_API_URL: https://example.invalid
          NEXT_PUBLIC_WEBSOCKET_URL: wss://example.invalid
          NEXT_PUBLIC_TG_BOT_NAME: sella_bot
          NEXT_PUBLIC_TRONGRID_API_KEY: placeholder
          NEXT_PUBLIC_RAINBOWKIT_PROJECT_ID: placeholder
          NEXT_PUBLIC_RAINBOWKIT_APP_NAME: Sella

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
